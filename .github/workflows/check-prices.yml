name: Check Real Estate Prices

on:
  schedule:
    # Svakog dana u 06:30 UTC (~07:30-08:30 po srpskom vremenu, zavisi od leta/zime)
    - cron: '30 6 * * *'
  workflow_dispatch:  # Manualni trigger iz GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run tracker
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        run: python -m app.tracker

      - name: Commit database changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tracker.db
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update tracker.db [skip ci]"
            git push
          fi
