name: On-Demand Search

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Halo oglasi search URL'
        required: true
        type: string
      label:
        description: 'Naziv pretrage (za prikaz)'
        required: false
        type: string

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run on-demand search
        run: python -m app.ondemand_search "${{ inputs.url }}" "${{ inputs.label }}"

      - name: Commit search results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p data
          git add data/last_ondemand_search.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: on-demand search results [skip ci]"
            git push
          fi
